name: "Build Android APK"

on:
  push:
    tags:
      - "v*" # 依然是监听打标签动作

jobs:
  build-android:
    runs-on: ubuntu-latest # 使用 GitHub 的 Linux 服务器，速度极快且自带安卓环境
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 配置 Java 环境 (Android 打包必需)
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      - name: 安装前端依赖
        run: npm install

      - name: 编译 React 静态文件
        run: npm run build

      - name: 同步代码到 Android 壳
        run: npx cap sync android

      - name: 编译生成 APK 安装包
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: 上传 APK 到 GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
